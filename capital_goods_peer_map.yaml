# =============================================================================
# Capital Goods coverage pack — curated peer map (source of truth)
# =============================================================================
# Edit this file to change coverage groups or peer baskets, then re-run
# scripts/compute_metrics.py and scripts/embed_data.py to rebuild the dashboard.
#
# symbol conventions: provider symbol with MIC qualifier where needed
#   (e.g. "SPX:XLON" = Spirax Group on London, not the S&P 500 index).
# quote_currency: trading currency of the listing (GBp = pence sterling).
# report_currency: currency of published financial statements (used for EV math).
# active: set false to drop a coverage group or peer without deleting it.
# preferred_metric: first choice when data supports it; the engine records the
#   actual basis used per comparison in `estimate_basis` (see methodology —
#   with no consensus estimates available in FactIQ, everything currently
#   resolves to LTM reported fallback).

pack: Capital Goods
version: 2026-07-11
default_preferred_metric: EV_EBITDA_LTM   # NTM EV/EBITA unavailable: no consensus feed
metric_hierarchy_requested: [NTM_EV_EBITA, NTM_EV_EBITDA, FY1_EV_EBITA, FY1_PE, NTM_FCF_YIELD, LTM_EV_EBITDA]


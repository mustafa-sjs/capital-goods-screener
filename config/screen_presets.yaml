# Screener presets — transparent, editable rules on screener columns.
# Numeric rules: '<= N' / '>= N'. State rules: 'in stateA|stateB'.
# All presets are SCREENS, not recommendations. Momentum states are
# descriptive (not backtested) — see docs/momentum_methodology.md.
# Revisions-based conditions remain impossible (no consensus feed) and are
# never faked; reported fundamentals + price momentum stand in, labelled.

value_with_positive_inflection:
  description: >
    Discount to direct peers with an emerging or established positive price
    trend and fundamentals not deteriorating.
  rules:
    prem_disc_vs_peers_pct: '<= -15'
    momentum_state: 'in emerging positive inflection|established uptrend'
    fundamental_state: 'in improving|stable'

quality_compounders:
  description: >
    Above-peer growth with improving fundamentals and an established uptrend;
    valuation premium accepted, shown not hidden.
  rules:
    rev_growth_pct: '>= 4'
    fundamental_state: 'in improving'
    momentum_state: 'in established uptrend|emerging positive inflection'

emerging_momentum_turn:
  description: >
    Fresh 20/60 EMA cross with improving gap — the earliest, least-proven
    signal family; treat as a research queue, not a buy list.
  rules:
    momentum_state: 'in emerging positive inflection'

cheap_but_deteriorating:
  description: >
    Value-trap screen: deep discount with deteriorating reported fundamentals
    or an established downtrend.
  rules:
    prem_disc_vs_peers_pct: '<= -20'
    fundamental_state: 'in deteriorating'

expensive_and_fading:
  description: >
    Premium valuation with fading uptrend or breakdown momentum and
    non-improving fundamentals.
  rules:
    prem_disc_vs_peers_pct: '>= 10'
    momentum_state: 'in fading uptrend|emerging breakdown|established downtrend'
    fundamental_state: 'in stable|deteriorating'

rerating_laggards:
  description: >
    Big peer discount at a low percentile of own history without reported
    revenue decline — the pack rerated, the name did not.
  rules:
    prem_disc_vs_peers_pct: '<= -25'
    hist_percentile: '<= 40'
    rev_growth_pct: '>= 0'

fundamental_inflections:
  description: >
    Margin inflection >= +1.5pp YoY that price has not yet followed
    (3M relative total return still negative).
  rules:
    margin_chg_pp: '>= 1.5'
    rel_3m_pct: '<= 0'

data_quality_exceptions:
  description: >
    Names whose numbers need care before use: NM multiples, proxies,
    restructurings, captive finance. Review, don't trade the table.
  rules:
    momentum_state: 'in indeterminate'

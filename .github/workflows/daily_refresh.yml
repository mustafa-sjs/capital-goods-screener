name: daily-refresh
# Incremental daily cycle: Yahoo prices -> engine -> validation -> publish to
# Supabase (if DATABASE_URL secret set) -> commit refreshed data files back.
# Free-tier guards: linux runner only, strict timeout, no overlapping runs,
# incremental fetch only (~1 month of bars/name, never full history).

on:
  schedule:
    - cron: '12 22 * * 1-5'   # US post-close: full daily cycle (22:12 UTC works year-round)
    - cron: '42 16 * * 1-5'   # European post-close: prices_only (London 16:30 + CET 17:30 closed by 16:42 UTC in BOTH DST regimes)
  workflow_dispatch: {}

concurrency:
  group: refresh
  cancel-in-progress: false   # never kill a mid-merge refresh; queue instead

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Refresh (mode by schedule — EU close = prices_only, US close = daily)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 20 ]; then MODE=prices_only; else MODE=daily; fi
          echo "running mode=$MODE (UTC hour $HOUR)"
          python scripts/refresh.py --mode $MODE
      - name: Commit refreshed data back to the repo
        run: |
          git config user.name 'refresh-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add data/raw data/computed capital_goods_dashboard.html capital_goods_*.csv
          git diff --cached --quiet || git commit -m "data: refresh $(date -u +%FT%H:%M) [skip ci]"
          git pull --rebase origin main || true
          git push
